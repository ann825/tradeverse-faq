<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트레이드버스 FAQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <span class="badge">Tradeverse Help Center</span>
      <h1>트레이드버스 FAQ</h1>
      <p>
        트레이드버스 이용 중 자주 묻는 질문을 빠르게 확인해보세요.
      </p>

      <div class="search-box">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="궁금한 내용을 검색해보세요. 예: OPEN API, 계좌, 전략, 주문"
        />
      </div>
    </div>
  </header>

  <main class="container">
    <section class="category-section">
      <div id="categoryButtons" class="category-buttons"></div>
    </section>

    <section class="faq-section">
      <div class="faq-top">
        <h2>자주 묻는 질문</h2>
        <p id="resultCount"></p>
      </div>

      <div id="faqList" class="faq-list"></div>

      <div id="emptyState" class="empty-state">
        검색 결과가 없습니다. 다른 키워드로 다시 검색해 주세요.
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>
      추가 문의는 카카오톡 트레이드버스 채널 1:1 문의를 이용해 주세요.
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>y>
</html>
